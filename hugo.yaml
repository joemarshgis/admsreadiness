baseURL: "https://www.admsreadiness.com/"
languageCode: "en-us"
title: "ADMS Readiness"
theme: "PaperMod"

enableRobotsTXT: true

services:
  googleAnalytics:
    id: G-B3N9Z66M03

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 20
    - identifier: rss
      name: RSS
      url: /index.xml
      weight: 30

caches:
  images:
    dir: ":cacheDir/images"

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  description: "Thoughts on GIS, utility architecture, ADMS, OMS, and operational data readiness."
  author: "Joe Marsh"
  keywords:
    - GIS
    - ADMS
    - OMS
    - Utilities
    - Utility Architecture
    - Operational Data
    - Grid Modernization

  profileMode:
    enabled: true
    title: "Joe Marsh"
    subtitle: "Thoughts on GIS, utility architecture, ADMS, OMS, and operational data readiness."
    imageUrl: "images/joe-marsh-headshot.jpg"
    imageTitle: "Joe Marsh"
    imageWidth: 180
    imageHeight: 180
    buttons:
      - name: Posts
        url: /posts/
      - name: About
        url: /about/
      - name: Subscribe
        url: /about/#subscribe

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/joemarshgis/"
    - name: email
      url: "mailto:joemarshgis@gmail.com"
    - name: rss
      url: "/index.xml"

  ShowReadingTime: true
  ShowWordCount: true
  ShowShareButtons: true
  ShareButtons:
    - linkedin
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowRssButtonInSectionTermList: true
  ShowCodeCopyButtons: false
  ShowToc: true
  TocOpen: false

markup:
  goldmark:
    renderer:
      unsafe: true